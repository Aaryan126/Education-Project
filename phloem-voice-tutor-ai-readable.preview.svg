  <text font-family="Arial, sans-serif" font-size="38" fill="#1e40af" text-anchor="start"><tspan x="70" y="84">Voice Tutor AI Pipeline</tspan></text>
  <text font-family="Arial, sans-serif" font-size="18" fill="#64748b" text-anchor="start"><tspan x="74" y="120">Speak -&gt; wait for a complete thought -&gt; understand -&gt; teach out loud -&gt; check progress.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#1e40af" text-anchor="middle"><tspan x="1625" y="83">Readable overview</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#c2410c" text-anchor="middle"><tspan x="117" y="268">1</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="207" y="277">Learner speaks</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="206" y="311">Hands-free mic listens.</tspan><tspan x="206" y="330.2">Listening pauses while</tspan><tspan x="206" y="349.4">the tutor is talking.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="540" y="296">Finished</tspan><tspan x="540" y="320.15">speaking?</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#b45309" text-anchor="start"><tspan x="616" y="314">yes</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#b45309" text-anchor="middle"><tspan x="530" y="431">not yet: wait</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#1e40af" text-anchor="middle"><tspan x="772" y="268">2</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="870" y="277">Speech becomes</tspan><tspan x="870" y="303.25">a message</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="870" y="325">Words are transcribed.</tspan><tspan x="870" y="343.3">Helpful voice signals</tspan><tspan x="870" y="361.6">travel with the message.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#6d28d9" text-anchor="middle"><tspan x="1147" y="244">3</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="1280" y="259">Tutor thinks</tspan><tspan x="1280" y="285.25">with context</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="1280" y="315">Uses the page, recent chat,</tspan><tspan x="1280" y="333.75">learner memory, and progress.</tspan><tspan x="1280" y="352.5">Goal: guide thinking.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#6d28d9" text-anchor="middle"><tspan x="1139" y="152">lesson page</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#6d28d9" text-anchor="middle"><tspan x="1270" y="134">recent chat</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#6d28d9" text-anchor="middle"><tspan x="1408" y="152">learner memory</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#047857" text-anchor="middle"><tspan x="1587" y="268">4</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="1692" y="277">Tutor speaks back</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="1693" y="311">Short spoken guidance.</tspan><tspan x="1693" y="330.2">Voice speed and highlighting</tspan><tspan x="1693" y="349.4">help the learner follow.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="middle"><tspan x="437" y="469">Phloem waits</tspan><tspan x="437" y="485.1">without cutting off</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#dc2626" text-anchor="middle"><tspan x="870" y="461">Voice signals help support</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#374151" text-anchor="middle"><tspan x="870" y="488">They do not grade correctness.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="24" fill="#1e40af" text-anchor="start"><tspan x="80" y="582">After the tutor speaks, learning is checked gently</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#64748b" text-anchor="start"><tspan x="84" y="612">One focused check updates mastery and improves the next reply.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#b45309" text-anchor="middle"><tspan x="757" y="698">5</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="870" y="707">One practice check</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="870" y="741">Activates only after</tspan><tspan x="870" y="760.2">tutor audio finishes.</tspan><tspan x="870" y="779.4">The next answer is used.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="1270" y="705">Answer is scored</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle"><tspan x="1180" y="751">Got it</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle"><tspan x="1289" y="751">Needs practice</tspan></text>
  <text font-family="Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle"><tspan x="1222" y="795">Confused</tspan></text>
  <text font-family="Arial, sans-serif" font-size="16" fill="#047857" text-anchor="middle"><tspan x="1557" y="698">6</tspan></text>
  <text font-family="Arial, sans-serif" font-size="21" fill="#374151" text-anchor="middle"><tspan x="1677" y="707">Next reply improves</tspan></text>
  <text font-family="Arial, sans-serif" font-size="15" fill="#374151" text-anchor="middle"><tspan x="1675" y="741">Mastery and session memory</tspan><tspan x="1675" y="760.2">shape the next explanation.</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#047857" text-anchor="middle"><tspan x="1283" y="516">after audio finishes</tspan></text>
  <text font-family="Arial, sans-serif" font-size="14" fill="#047857" text-anchor="middle"><tspan x="1544" y="476">progress guides the next turn</tspan></text>
</svg>